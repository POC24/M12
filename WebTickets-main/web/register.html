<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Registar — Gestor de Tickets</title>
  <link rel="stylesheet" href="./css/styles.css" />
  <style>
    .auth-container { max-width: 420px; margin: 4rem auto; padding: 0 1rem; }
    .auth-card { background: var(--surface, #fff); border: 1px solid var(--border, #e0e0e0); border-radius: 8px; padding: 2rem; }
    .auth-card h1 { margin-top: 0; font-size: 1.5rem; }
    .strength-bar { height: 6px; border-radius: 3px; background: #eee; margin-top: 4px; overflow: hidden; }
    .strength-bar__fill { height: 100%; width: 0; border-radius: 3px; transition: width .3s, background .3s; }
    .strength-label { font-size: .8rem; margin-top: 4px; }
    .requirements { font-size: .8rem; color: #666; margin: .25rem 0 .5rem; padding-left: 1rem; }
    .requirements li { margin: 2px 0; }
    .req--ok  { color: #1e7e34; }
    .req--fail { color: #c0392b; }
    .nav__link--locked { pointer-events: none; opacity: 0.4; cursor: default; }
    .alert { padding: .75rem 1rem; border-radius: 6px; margin-bottom: 1rem; font-size: .9rem; }
    .alert--error { background: #fde8e8; color: #c0392b; border: 1px solid #f5c6cb; }
    .alert--success { background: #e8f8e8; color: #1e7e34; border: 1px solid #c3e6cb; }
  </style>
</head>
<body>
  <header class="site-header">
    <nav class="nav" aria-label="Navegação principal">
      <div class="nav__inner">
        <a class="brand" href="./index.html" aria-label="Ir para a página principal">
          <span class="brand__mark" aria-hidden="true">📒</span>
          <span class="brand__text">Gestor de Tickets</span>
        </a>
        <ul class="nav__menu">
          <li><a class="nav__link nav__link--locked" href="./index.html">Tickets</a></li>
          <li><a class="nav__link nav__link--locked" href="./stats.html">Estatísticas</a></li>
          <li><a class="nav__link nav__link--locked" href="./about.html">Sobre</a></li>
          <li><a class="nav__link" href="./login.html">Entrar</a></li>
        </ul>
      </div>
    </nav>
  </header>

  <main class="auth-container">
    <div class="auth-card">
      <h1>Criar Conta</h1>

      <div id="alertBox" role="alert" aria-live="polite"></div>

      <form id="registerForm" novalidate>
        <div class="field">
          <label for="username">Nome de utilizador</label>
          <input id="username" type="text" name="username" required autocomplete="username" minlength="3" />
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" name="email" required autocomplete="email" />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" name="password" required autocomplete="new-password" />

          <!-- Ex. 1.2: Indicador de força da password -->
          <div class="strength-bar" aria-hidden="true">
            <div class="strength-bar__fill" id="strengthFill"></div>
          </div>
          <p class="strength-label" id="strengthLabel"></p>

          <ul class="requirements" id="requirements" aria-label="Requisitos da password">
            <li id="req-length" class="req--fail">Mínimo 8 caracteres</li>
            <li id="req-upper"  class="req--fail">Pelo menos 1 letra maiúscula</li>
            <li id="req-number" class="req--fail">Pelo menos 1 número</li>
            <li id="req-special" class="req--fail">Pelo menos 1 caracter especial (!@#$…)</li>
          </ul>
        </div>

        <div class="form-actions">
          <!-- Ex. 1.2: botão desativado enquanto a password for fraca -->
          <button class="btn btn--primary" type="submit" id="submitBtn" disabled>Registar</button>
        </div>
      </form>

      <p class="muted" style="margin-top:1rem; font-size:.9rem;">
        Já tem conta? <a href="./login.html">Entrar</a>
      </p>
    </div>
  </main>

  <script type="module" src="./js/auth.js"></script>
</body>
</html>
