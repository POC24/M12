<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login — Gestor de Tickets</title>
  <link rel="stylesheet" href="./css/styles.css" />
  <style>
    .auth-container { max-width: 420px; margin: 4rem auto; padding: 0 1rem; }
    .auth-card { background: var(--surface, #fff); border: 1px solid var(--border, #e0e0e0); border-radius: 8px; padding: 2rem; }
    .auth-card h1 { margin-top: 0; font-size: 1.5rem; }
    .pwd-wrapper { position: relative; display: flex; align-items: center; }
    .pwd-wrapper input { flex: 1; padding-right: 2.5rem; }
    .pwd-toggle { position: absolute; right: 0.5rem; background: none; border: none; cursor: pointer; font-size: 1.1rem; padding: 0; line-height: 1; color: #666; }
    .nav__link--locked { pointer-events: none; opacity: 0.4; cursor: default; }
    .alert { padding: .75rem 1rem; border-radius: 6px; margin-bottom: 1rem; font-size: .9rem; }
    .alert--error { background: #fde8e8; color: #c0392b; border: 1px solid #f5c6cb; }
    .alert--success { background: #e8f8e8; color: #1e7e34; border: 1px solid #c3e6cb; }
  </style>
</head>
<body>
  <header class="site-header">
    <nav class="nav" aria-label="Navegação principal">
      <div class="nav__inner">
        <a class="brand" href="./index.html" aria-label="Ir para a página principal">
          <span class="brand__mark" aria-hidden="true">📒</span>
          <span class="brand__text">Gestor de Tickets</span>
        </a>
        <ul class="nav__menu">
          <li><a class="nav__link nav__link--locked" href="./index.html">Tickets</a></li>
          <li><a class="nav__link nav__link--locked" href="./stats.html">Estatísticas</a></li>
          <li><a class="nav__link nav__link--locked" href="./about.html">Sobre</a></li>
          <li><a class="nav__link is-active" href="./login.html">Entrar</a></li>
        </ul>
      </div>
    </nav>
  </header>

  <main class="auth-container">
    <div class="auth-card">
      <h1>Entrar</h1>

      <div id="alertBox" role="alert" aria-live="polite"></div>

      <form id="loginForm" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" name="email" required autocomplete="email" />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="pwd-wrapper">
            <input id="password" type="password" name="password" required autocomplete="current-password" />
            <button type="button" class="pwd-toggle" id="pwdToggle" aria-label="Mostrar password" title="Mostrar/ocultar password">👁</button>
          </div>

        </div>

        <div class="form-actions">
          <button class="btn btn--primary" type="submit" id="submitBtn">Entrar</button>
        </div>
      </form>

      <p class="muted" style="margin-top:1rem; font-size:.9rem;">
        Não tem conta? <a href="./register.html">Registar</a>
      </p>
    </div>
  </main>

  <script type="module" src="./js/auth.js"></script>
</body>
</html>
